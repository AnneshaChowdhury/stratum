version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schemamorph
      POSTGRES_PASSWORD: schemamorph
      POSTGRES_DB: schemamorph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schemamorph"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://schemamorph:schemamorph@db:5432/schemamorph
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: mistral
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app

volumes:
  pgdata:
